; platformio.ini — PATCHED VERSION
; Change from original: added -std=gnu++17 to build_flags to enable C++17
; and silence the "inline variables only available with -std=c++17" warnings.
; All other settings preserved from the original.

[env:supermini]
platform  = espressif32@6.5.0
board     = esp32-c3-devkitm-1
framework = arduino

build_flags =
    -std=gnu++17
    -DWM_MDNS
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

build_unflags =
    -std=gnu++11

lib_deps =
    lovyan03/LovyanGFX
    tzapu/WiFiManager
    bblanchon/ArduinoJson

board_build.filesystem = littlefs
board_upload.flash_size = 4MB

monitor_speed = 115200
